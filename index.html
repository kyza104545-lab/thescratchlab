    <!-- Structured Data: FAQ -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "Do you offer mobile boat detailing?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes — we are a fully mobile service. We come directly to your marina, dock, storage facility, or home in Myrtle Beach and the surrounding coastal areas of South Carolina."
            }
          },
          {
            "@type": "Question",
            "name": "Can you remove oxidation from my boat's gelcoat?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. We specialize in marine oxidation removal and gelcoat restoration. Most moderately oxidized boats respond very well to a two-step compound and polish treatment."
            }
          },
          {
            "@type": "Question",
            "name": "What areas do you serve?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "We serve Myrtle Beach and the surrounding coastal areas of South Carolina including the Grand Strand region. Contact us to confirm availability at your location."
            }
          },
          {
            "@type": "Question",
            "name": "How do I request a quote for boat polishing?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Call us at 843-855-8272 or use the appointment form on our website. We'll discuss your boat's size, condition, and location to provide an accurate estimate."
            }
          },
          {
            "@type": "Question",
            "name": "How long does boat detailing take?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "A one-step detail typically takes 4–6 hours. Two-step oxidation removal and polish on larger boats can take a full day or more depending on size and condition."
            }
          },
          {
            "@type": "Question",
            "name": "Do you detail RVs and cars as well as boats?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. In addition to mobile boat detailing, we provide paint correction, polishing, and ceramic coating services for RVs, cars, and aircraft."
            }
          }
        ]
      }
